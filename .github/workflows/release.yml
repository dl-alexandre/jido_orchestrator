name: Release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  test:
    name: Test & Build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: erlef/setup-beam@v1
        with:
          elixir-version: "1.19"
          otp-version: "27"

      - uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt

      - name: Cache Mix deps
        uses: actions/cache@v4
        with:
          path: deps
          key: ${{ runner.os }}-mix-${{ hashFiles('**/mix.lock') }}
          restore-keys: |
            ${{ runner.os }}-mix-

      - name: Cache Cargo artifacts
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            crates/jx-launcher/target
          key: ${{ runner.os }}-cargo-${{ hashFiles('crates/jx-launcher/Cargo.lock') }}
          restore-keys: |
            ${{ runner.os }}-cargo-

      - name: Fetch dependencies
        run: mix deps.get

      - name: Audit Hex dependencies
        run: mix hex.audit

      - name: Check formatting
        run: mix format --check-formatted

      - name: Check Rust formatting
        run: cargo fmt --manifest-path crates/jx-launcher/Cargo.toml -- --check

      - name: Compile (warnings as errors)
        run: mix compile --warnings-as-errors

      - name: Build Rust launcher
        run: cargo build --manifest-path crates/jx-launcher/Cargo.toml --release --locked

      - name: Run tests
        run: mix test

      - name: Build Hex package
        run: mix hex.build

      - name: Build docs
        run: mix docs

      - name: Build OTP release
        env:
          BURRITO_BUILD: ""
          MIX_ENV: prod
        run: mix release

      - name: Package release tarball
        run: |
          package="jido_orchestrator"
          mkdir -p dist
          tar czf "dist/${package}-${{ github.ref_name }}.tar.gz" -C _build/prod/rel/jx .

      - name: Package launcher bundle
        run: |
          package="jido_orchestrator"
          version="${GITHUB_REF_NAME}"
          target="x86_64-unknown-linux-gnu"
          bundle_name="${package}-${version}-${target}"
          bundle_dir="dist/bundle/${bundle_name}"

          mkdir -p "${bundle_dir}"
          cp crates/jx-launcher/target/release/jx-launcher "${bundle_dir}/jx"
          cp "dist/${package}-${version}.tar.gz" "${bundle_dir}/jx-release.tar.gz"
          printf '%s\n' "${version}" > "${bundle_dir}/version.txt"
          chmod +x "${bundle_dir}/jx"

          tar czf "dist/${bundle_name}.tar.gz" -C dist/bundle "${bundle_name}"

      - name: Upload release assets
        uses: actions/upload-artifact@v4
        with:
          name: jido_orchestrator-release
          path: dist/*.tar.gz

  release:
    name: Create GitHub Release
    needs: test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Download release assets
        uses: actions/download-artifact@v4
        with:
          name: jido_orchestrator-release
          path: artifacts

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          files: artifacts/*.tar.gz
          generate_release_notes: true
          fail_on_unmatched_files: true
